name: Build debug APK

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  apk:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Accept Android SDK licenses
        run: yes | "$ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager" --licenses > /dev/null || true

      - name: Build
        run: |
          chmod +x gradlew
          set -o pipefail
          ./gradlew assembleDebug --stacktrace --no-daemon 2>&1 | tee build.log

      - name: Publish build log to ci-log branch
        if: always()
        run: |
          mkdir -p /tmp/logrepo && cd /tmp/logrepo
          git init -q -b ci-log
          tail -c 900000 "$GITHUB_WORKSPACE/build.log" > build.log || echo "no log" > build.log
          git config user.email "ci@quietstudio"
          git config user.name "CI"
          git add build.log
          git commit -qm "build log ${GITHUB_SHA}"
          git push -f "https://x-access-token:${{ github.token }}@github.com/${{ github.repository }}.git" ci-log

      - name: Publish APK to apk-release branch
        if: success()
        run: |
          mkdir -p /tmp/apkrepo && cd /tmp/apkrepo
          git init -q -b apk-release
          cp "$GITHUB_WORKSPACE/app/build/outputs/apk/debug/app-debug.apk" quiet-studio-debug.apk
          git config user.email "ci@quietstudio"
          git config user.name "CI"
          git add quiet-studio-debug.apk
          git commit -qm "apk ${GITHUB_SHA}"
          git push -f "https://x-access-token:${{ github.token }}@github.com/${{ github.repository }}.git" apk-release

      - uses: actions/upload-artifact@v4
        if: success()
        with:
          name: quiet-studio-debug
          path: app/build/outputs/apk/debug/app-debug.apk
