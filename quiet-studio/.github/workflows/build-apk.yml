name: Build debug APK

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  apk:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Accept Android SDK licenses
        run: yes | "$ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager" --licenses > /dev/null || true

      - name: Build
        run: ./gradlew assembleDebug --stacktrace --no-daemon

      - uses: actions/upload-artifact@v4
        with:
          name: quiet-studio-debug
          path: app/build/outputs/apk/debug/app-debug.apk

      - name: Publish APK as release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          cp app/build/outputs/apk/debug/app-debug.apk quiet-studio-debug.apk
          gh release delete latest-debug --yes || true
          git push --delete origin latest-debug 2>/dev/null || true
          gh release create latest-debug quiet-studio-debug.apk \
            --title "Quiet Studio — latest debug build" \
            --notes "Auto-built from ${GITHUB_SHA}. Sideload: enable 'install unknown apps', open the APK."
